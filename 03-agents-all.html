<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mesh.ai — Animation · Agent Marks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #0B0D21;
  --rule:  rgba(255,255,255,0.07);
  --white: #EDF0FA;
  --dim:   rgba(237,240,250,0.38);
  --dim2:  rgba(237,240,250,0.55);
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  margin: 0;
  padding: 0;
}

.info {
  position: fixed;
  top: 20px;
  left: 60px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  z-index: 10;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 40px;
  padding: 100px 60px 60px;
  max-width: 1200px;
  margin: 0 auto;
}

.agent-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  padding: 40px 24px;
  border: 1px solid var(--rule);
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.03);
}

.agent-mark {
  width: 140px;
  height: 140px;
  line-height: 0;
}

.agent-meta {
  text-align: center;
}

.agent-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.agent-role {
  font-size: 12px;
  color: var(--dim2);
}

.replay {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 10px 18px;
  border-radius: 100px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--dim2);
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
  margin-top: 16px;
}

.replay:hover {
  border-color: rgba(255, 255, 255, 0.22);
  color: var(--white);
}

.replay svg {
  width: 13px;
  height: 13px;
}

.controls {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 12px;
}

.replay-all {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 10px 18px;
  border-radius: 100px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--dim2);
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.replay-all:hover {
  border-color: rgba(255, 255, 255, 0.22);
  color: var(--white);
}

.replay-all svg {
  width: 13px;
  height: 13px;
}
</style>
</head>
<body>

<div class="info">mesh.ai · Agent Animations</div>

<div class="container" id="agents"></div>

<div class="controls">
  <button class="replay-all" id="replayAll">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
    Replay all
  </button>
</div>

<script src="gifenc-mini.js"></script>
<script src="mesh-mark.js"></script>
<script src="mesh-anim.js"></script>
<script>
  const agentsEl = document.getElementById('agents');
  const agentComms = [];

  MeshMark.AGENTS.forEach((agent, idx) => {
    const card = document.createElement('div');
    card.className = 'agent-card';

    const markBox = document.createElement('div');
    markBox.className = 'agent-mark';

    const meta = document.createElement('div');
    meta.className = 'agent-meta';
    meta.innerHTML = `
      <div class="agent-name">${agent.name}</div>
      <div class="agent-role">${agent.role}</div>
    `;

    const replayBtn = document.createElement('button');
    replayBtn.className = 'replay';
    replayBtn.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      Replay
    `;

    card.appendChild(markBox);
    card.appendChild(meta);
    card.appendChild(replayBtn);
    agentsEl.appendChild(card);

    const comm = MeshComm(markBox, null, {
      mono: agent.color,
      hub: agent.color,
      ink: agent.color,
      duration: 2600
    });

    agentComms.push({ agent, comm, btn: replayBtn });

    replayBtn.addEventListener('click', () => comm.play());
  });

  function playAll() {
    agentComms.forEach(({ comm }, i) => {
      setTimeout(() => comm.play(), i * 240);
    });
  }

  document.getElementById('replayAll').addEventListener('click', playAll);

  // Auto-play on load
  requestAnimationFrame(() => setTimeout(playAll, 350));
</script>

</body>
</html>
