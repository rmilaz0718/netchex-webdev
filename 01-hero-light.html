<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mesh.ai — Animation · Hero Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #F4F5FB;
  --mid:   #EBEDF6;
  --rule:  rgba(10,12,28,0.08);
  --white: #0A0C1C;
  --dim:   rgba(10,12,28,0.38);
  --dim2:  rgba(10,12,28,0.55);
  --blue:  #2B51D6;
}

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--white);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  margin: 0;
  padding: 0;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 80px 60px;
  overflow: hidden;
}

.lockup {
  display: flex;
  align-items: center;
  gap: 8px;
}

.mark-box {
  flex: 0 0 auto;
  line-height: 0;
  width: 120px;
  height: 120px;
}

.wm {
  font-size: 96px;
  font-weight: 700;
  letter-spacing: -0.044em;
  line-height: 1;
  color: var(--white);
  white-space: nowrap;
  user-select: none;
}

.wm .a {
  color: var(--blue);
}

.hero-wm {
  opacity: 0;
}

.hero-wm.revealed {
  opacity: 1;
  animation: wmIn 0.82s cubic-bezier(0.2, 0.85, 0.25, 1) forwards;
}

@keyframes wmIn {
  from {
    opacity: 0;
    transform: translateX(-14px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}

.button-group {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: 12px;
}

.replay, .export-gif {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 10px 18px;
  border-radius: 100px;
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--dim2);
  font-family: inherit;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}

.replay:hover, .export-gif:hover {
  border-color: rgba(10, 12, 28, 0.26);
  color: var(--white);
}

.replay svg, .export-gif svg {
  width: 13px;
  height: 13px;
}

.info {
  position: absolute;
  top: 20px;
  left: 60px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}

.status {
  position: absolute;
  top: 20px;
  right: 60px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
}
</style>
</head>
<body>

<div class="info">mesh.ai · Hero Light Animation</div>
<div class="status" id="status"></div>

<div class="container">
  <div class="lockup" id="lockup">
    <div id="liveMark" class="mark-box"></div>
    <div class="wm hero-wm" id="heroWM" style="--ai-color:#2B51D6;"></div>
  </div>

  <div class="button-group">
    <button class="replay" id="replay">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      Replay
    </button>
    <button class="export-gif" id="exportGif">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export GIF
    </button>
  </div>
</div>

<script src="gifenc-mini.js"></script>
<script src="mesh-mark.js"></script>
<script src="mesh-anim.js"></script>
<script>
  // Build wordmark with character spans
  function buildWM(el) {
    const text = 'mesh.ai', aiFrom = 4;
    el.innerHTML = '';
    [...text].forEach((ch, i) => {
      const sp = document.createElement('span');
      sp.className = 'wm-char' + (i >= aiFrom ? ' a' : '');
      sp.textContent = ch;
      el.appendChild(sp);
    });
  }

  const heroWM = document.getElementById('heroWM');
  buildWM(heroWM);

  const comm = MeshComm(
    document.getElementById('liveMark'),
    heroWM,
    {
      ink: '#0A0C1C',
      hub: '#2B51D6',
      duration: 3000,
      textDelay: 360,
      centerShift: true,
      lockupEl: document.getElementById('lockup')
    }
  );

  // Play on load with a small delay
  requestAnimationFrame(() => setTimeout(() => comm.play(), 350));

  document.getElementById('replay').addEventListener('click', () => comm.play());

  // Export GIF
  document.getElementById('exportGif').addEventListener('click', async () => {
    const btn = document.getElementById('exportGif');
    const status = document.getElementById('status');
    
    btn.disabled = true;
    status.textContent = 'Exporting...';
    
    try {
      // Capture animation as GIF
      const canvas = document.getElementById('liveMark').querySelector('svg')?.parentElement || document.getElementById('liveMark');
      
      // Use MeshGIF if available
      if (window.MeshGIF && window.MeshGIF.recordGIF) {
        await window.MeshGIF.recordGIF({
          duration: 3000,
          filename: 'mesh-ai-hero-light.gif',
          width: 600,
          height: 600,
          quality: 2
        });
        status.textContent = 'Downloaded!';
      } else {
        status.textContent = 'GIF export not available';
      }
    } catch (e) {
      console.error('Export failed:', e);
      status.textContent = 'Export failed';
    } finally {
      btn.disabled = false;
      setTimeout(() => { status.textContent = ''; }, 2000);
    }
  });
</script>

</body>
</html>
